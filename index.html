<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔡展文 - 个人简历</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            background: #fff; color: #1d1d1f; line-height: 1.5;
        }
        .container { max-width: 980px; margin: 0 auto; padding: 0 22px; }
        
        /* Hero */
        .hero {
            text-align: center; padding: 80px 0 60px;
        }
        .avatar {
            width: 150px; height: 150px; border-radius: 50%; object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 24px; display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 48px; font-weight: 300;
        }
        .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .hero h1 { font-size: 48px; font-weight: 600; letter-spacing: -0.5px; }
        .hero p { font-size: 21px; color: #86868b; margin-top: 8px; }
        
        /* Cards */
        .cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; padding: 40px 0 80px;
        }
        .card {
            background: #f5f5f7; border-radius: 18px; padding: 32px;
            cursor: pointer; transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
        }
        .card-icon { font-size: 36px; margin-bottom: 16px; }
        .card h3 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .card p { color: #86868b; font-size: 14px; }
        
        /* Modal */
        .modal {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #fff; border-radius: 18px; max-width: 680px; width: 100%;
            max-height: 85vh; overflow-y: auto; position: relative;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            padding: 24px 32px; border-bottom: 1px solid #e5e5e5;
            display: flex; align-items: center; gap: 16px;
            position: sticky; top: 0; background: #fff; border-radius: 18px 18px 0 0;
        }
        .modal-header span { font-size: 32px; }
        .modal-header h2 { font-size: 24px; font-weight: 600; }
        .modal-close {
            position: absolute; right: 20px; top: 20px; width: 30px; height: 30px;
            border: none; background: #e5e5e5; border-radius: 50%; cursor: pointer;
            font-size: 18px; color: #86868b; transition: background 0.2s;
        }
        .modal-close:hover { background: #d5d5d5; }
        .modal-body { padding: 24px 32px; }
        .modal-body h4 { font-size: 17px; font-weight: 600; color: #1d1d1f; margin: 20px 0 8px; }
        .modal-body h4:first-child { margin-top: 0; }
        .modal-body p, .modal-body li { color: #424245; font-size: 15px; }
        .modal-body ul { padding-left: 20px; }
        .modal-body li { margin: 6px 0; }
        .tag {
            display: inline-block; background: #e8f4fd; color: #0071e3;
            padding: 4px 12px; border-radius: 20px; font-size: 13px; margin: 4px 4px 4px 0;
        }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .info-item span { display: block; color: #86868b; font-size: 13px; }
        .info-item strong { font-size: 15px; }
        
        /* Responsive */
        @media (max-width: 600px) {
            .hero { padding: 60px 0 40px; }
            .hero h1 { font-size: 32px; }
            .hero p { font-size: 17px; }
            .cards { grid-template-columns: 1fr; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <div class="avatar">
        <img src="你刚才上传的照片全名.jpg" alt="照片">

            <h1>蔡展文</h1>

        <section class="cards">

            <div class="card" onclick="openModal('edu')">

    </div>

        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-header"><span id="modalIcon"></span><h2 id="modalTitle"></h2></div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

            skill: {

        };

        function openModal(key) {
            const d = data[key];
            document.getElementById('modalIcon').textContent = d.icon;
            document.getElementById('modalTitle').textContent = d.title;
            document.getElementById('modalBody').innerHTML = d.html;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        }
        document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });
    </script>
</body>
</html>
